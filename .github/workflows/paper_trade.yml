name: Paper Trading

on:
  schedule:
    - cron: '5 * * * *'  # Every hour at :05
  workflow_dispatch: {}   # Manual trigger from GitHub UI

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Restore state from cache
        uses: actions/cache/restore@v4
        with:
          path: paper_trading
          key: pt-v2-dummy
          restore-keys: pt-v2-

      - name: Run executor
        run: uv run executor.py

      - name: Save state to cache
        uses: actions/cache/save@v4
        with:
          path: paper_trading
          key: pt-v2-${{ github.run_id }}
